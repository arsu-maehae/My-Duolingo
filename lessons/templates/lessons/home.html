<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JP Learn - เรียนภาษาญี่ปุ่น</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+Thai:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue:   #1cb0f6;
            --green:  #58cc02;
            --orange: #ff9600;
            --card-radius: 24px;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Noto Sans Thai', sans-serif;
            background: linear-gradient(160deg, #e8f4fd 0%, #f0fbe8 100%);
            /* 🌟 1. บังคับความสูงให้เท่ากับหน้าจอ 100% และซ่อน Scrollbar */
            height: 100vh;
            overflow: hidden; 
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 🌟 2. คอนเทนเนอร์หลักจัดให้อยู่ตรงกลาง */
        .main-container {
            width: 100%;
            max-width: 560px;
            padding: 2rem;
        }

        /* ─── Brand ─── */
        .brand-title {
            font-family: 'Fredoka', sans-serif;
            font-size: clamp(2.8rem, 8vw, 4.5rem);
            font-weight: 700;
            color: #2c3e50;
            line-height: 1;
            letter-spacing: -1px;
        }
        .brand-subtitle {
            font-size: 1.1rem;
            color: #6c757d;
            font-weight: 600;
        }
        .brand-char-strip {
            font-size: 2.5rem;
            letter-spacing: 0.5rem;
            opacity: 0.15;
            user-select: none;
            font-family: 'Fredoka', sans-serif;
        }

        /* ─── CTA cards ─── */
        .cta-card {
            border-radius: var(--card-radius);
            border: none;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            padding: 2rem 2.5rem;
            gap: 1.5rem;
            transition: transform 0.15s, box-shadow 0.15s, filter 0.15s;
            position: relative;
            overflow: hidden;
        }
        .cta-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0.12);
            opacity: 0;
            transition: opacity 0.2s;
        }
        .cta-card:hover { transform: translateY(-6px); filter: brightness(1.05); }
        .cta-card:hover::after { opacity: 1; }
        .cta-card:active { transform: translateY(2px); box-shadow: 0 4px 10px rgba(0,0,0,0.15) !important; }

        .cta-vocab {
            background: linear-gradient(135deg, #1cb0f6, #0d92d6);
            box-shadow: 0 8px 0 #0d80bd, 0 12px 30px rgba(28,176,246,0.35);
            color: white;
        }
        .cta-test {
            background: linear-gradient(135deg, #58cc02, #3fa800);
            box-shadow: 0 8px 0 #318500, 0 12px 30px rgba(88,204,2,0.35);
            color: white;
        }
        .cta-icon-wrap {
            width: 72px;
            height: 72px;
            border-radius: 18px;
            background: rgba(255,255,255,0.22);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 2rem;
        }
        .cta-title {
            font-family: 'Fredoka', sans-serif;
            font-size: 1.75rem;
            font-weight: 700;
            line-height: 1.1;
            margin: 0 0 4px;
            color: white;
        }
        .cta-sub {
            font-size: 0.9rem;
            opacity: 0.88;
            margin: 0;
            font-weight: 500;
            color: white;
        }
        .cta-arrow {
            margin-left: auto;
            font-size: 1.4rem;
            opacity: 0.7;
            color: white;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="text-center mb-5">
            <h1 class="brand-title mb-2">🇯🇵 JP Learn</h1>
            <p class="brand-subtitle">พัฒนาทักษะภาษาญี่ปุ่นของคุณวันนี้!</p>
        </div>

        <div class="d-flex flex-column gap-4">
            <a href="{% url 'vocab_bank' %}" class="cta-card cta-vocab shadow-lg">
                <div class="cta-icon-wrap">
                    <i class="fas fa-book-open"></i>
                </div>
                <div>
                    <p class="cta-title">คลังคำศัพท์</p>
                    <p class="cta-sub">Vocabulary Bank · JLPT N5–N1</p>
                </div>
                <i class="fas fa-chevron-right cta-arrow"></i>
            </a>

            <a href="{% url 'play_home' %}" class="cta-card cta-test shadow-lg">
                <div class="cta-icon-wrap">
                    <i class="fas fa-gamepad"></i>
                </div>
                <div>
                    <p class="cta-title">เข้าสู่บททดสอบ</p>
                    <p class="cta-sub">Start Testing · 5 Game Levels</p>
                </div>
                <i class="fas fa-chevron-right cta-arrow"></i>
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
